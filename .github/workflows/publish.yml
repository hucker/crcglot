name: Publish to PyPI

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC: required for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Build distribution
        run: uv build
      - name: Publish to PyPI via trusted publishing
        # pypa/gh-action-pypi-publish auto-detects the OIDC token
        # from id-token write permission and exchanges it for a
        # short-lived API token, matching the trusted-publisher
        # config registered on pypi.org.  No PYPI_API_TOKEN secret
        # needs to live in repo settings.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
