name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Run fast suite
        # crcglot's verification model: CI runs the structural (fast)
        # tests, which exercise the generator code itself.  The slow
        # tests shell out to gcc / rustc / go / dotnet / tsx / iverilog
        # / ghdl to compile-and-run the *generated* code -- those run
        # on a developer machine that already has the toolchains, NOT
        # in CI.  The shipped value is the embedded `_self_test()`
        # function the end user calls on THEIR toolchain, with THEIR
        # version, against THEIR target.  CI installing seven compilers
        # just to compile catalogue check vectors is the wrong axis
        # of confidence -- the customer's compiler is what matters.
        run: uv run --python ${{ matrix.python-version }} pytest -m "not slow"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync
      - name: Run pip-audit
        run: uvx pip-audit --strict --skip-editable --path .
