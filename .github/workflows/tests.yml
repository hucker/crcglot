name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install GHDL (for VHDL execution tests)
        # gcc and rustc are preinstalled on ubuntu-latest; the C and
        # Rust generated-code execution tests run automatically.  GHDL
        # is the one toolchain that needs an explicit install before
        # the VHDL execution tests can verify the generator.
        run: sudo apt-get update && sudo apt-get install -y ghdl
      - name: Run tests
        run: uv run --python ${{ matrix.python-version }} pytest

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync
      - name: Run pip-audit
        run: uvx pip-audit --strict --skip-editable --path .
