name: Wheels

# Builds the cross-platform abi3 wheel matrix + sdist, runs the in-wheel
# parity tests on every platform, and -- on a version-tag push -- publishes
# the lot to PyPI via OIDC trusted publishing (the ``publish`` job below).
#
# Why publishing lives here and not in a ``uv build`` step:
#   crcglot ships a C extension, so the build backend is setuptools and
#   each platform needs its own compiled wheel.  ``uv build`` on a single
#   runner would produce a wheel for only that platform -- wrong for a
#   cross-platform release.  Only this cibuildwheel matrix produces the
#   full set (Linux x86_64/aarch64 manylinux+musllinux, Windows x64/arm64,
#   macOS arm64) plus the sdist.  So the same workflow that PR-tests the
#   wheels also publishes them on tag.  (The old publish.yml, which did a
#   single-platform ``uv build`` on tag, has been removed.)
#
# Trusted publishing is keyed to THIS workflow filename on pypi.org -- if
# the publish step ever fails with "not a trusted publisher", update the
# publisher entry to point at ``wheels.yml`` (see scripts/RELEASE.md).

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"      # a version tag triggers the build matrix + the publish job
  pull_request:
    paths:
      - "src/crcglot/_c.c"
      - "src/crcglot/_c.pyi"
      - "pyproject.toml"
      - ".github/workflows/wheels.yml"

jobs:
  test:
    # The release gate.  Runs the structural fast suite on Linux across every
    # supported Python -- the axis the maintainer's Windows box does not cover.
    # ``publish`` needs this job, so a red suite blocks the PyPI upload: a
    # tagged release can no longer go live while these tests fail (the C#
    # filename case bug shipped 0.24.0 precisely because nothing gated on it).
    # Mirrors the test job in tests.yml; the slow tier (compile-and-run the
    # generated code) stays off CI by design.
    name: Fast suite gate ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          # Off for the same reason as tests.yml: the concurrent gate
          # jobs would race on one shared cache key for negligible gain.
          enable-cache: false
      - name: Run fast suite
        run: uv run --python ${{ matrix.python-version }} pytest -m "not slow"

  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # One runner per (platform, arch).  abi3 means one wheel each,
        # good for every CPython 3.11+.
        os:
          # Linux runners build BOTH manylinux (glibc) and musllinux
          # (Alpine/musl) wheels for their arch -- so these two runners
          # yield four Linux wheels total.
          - ubuntu-latest      # manylinux + musllinux x86_64 (desktops, servers, WSL, Docker)
          - ubuntu-24.04-arm   # manylinux + musllinux aarch64 (Raspberry Pi 64-bit, Graviton)
          - windows-latest     # win_amd64 (Intel / AMD)
          - windows-11-arm     # win_arm64 (Surface Pro X, Snapdragon X laptops)
          - macos-14           # macOS arm64 (Apple Silicon)
          # macos-13 (Intel Mac) intentionally omitted: GitHub is
          # retiring the Intel-macOS runners and the job sat starved in
          # the queue.  Apple Silicon covers the modern Mac; the rare
          # Intel-Mac user builds from the always-published sdist (clang
          # is present).  Re-add `macos-13` here if Intel demand returns
          # and runners are available again.
    steps:
      - uses: actions/checkout@v7

      - name: Build + test wheels
        uses: pypa/cibuildwheel@v2.21.3
        # All build/test/skip config lives in [tool.cibuildwheel] in
        # pyproject.toml -- keeps this workflow thin and lets you
        # reproduce locally with ``uvx cibuildwheel``.

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    # Only on a version-tag push -- never on a PR or a manual dispatch, so
    # the matrix can be exercised freely without touching PyPI.  Waits for the
    # fast-suite gate, every wheel job, AND the sdist to go green first, so a
    # failing test blocks the upload rather than racing it.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC: required for PyPI trusted publishing
    steps:
      - name: Download all wheels + sdist
        uses: actions/download-artifact@v8
        with:
          # No ``name:`` -> grab every artifact from this run (the five
          # wheels-<os> bundles plus the sdist); merge-multiple flattens
          # them all into a single dist/ directory.
          path: dist
          merge-multiple: true

      - name: Publish to PyPI via trusted publishing
        # gh-action-pypi-publish auto-detects the OIDC token from the
        # id-token:write permission and exchanges it for a short-lived
        # upload token matching the trusted-publisher config on pypi.org.
        # No PYPI_API_TOKEN secret lives in the repo.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
