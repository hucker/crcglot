name: Wheels

# Builds the cross-platform abi3 wheel matrix + sdist and uploads them
# as CI artifacts.  Does NOT publish to PyPI yet -- run this manually
# (Actions tab -> Wheels -> Run workflow) and confirm every platform
# goes green, then download the artifacts and smoke-test on real Mac /
# Raspberry Pi hardware before wiring up publishing.
#
# IMPORTANT -- publishing migration pending:
#   The existing publish.yml still fires on ``v*.*.*`` tags and builds
#   with ``uv build``.  Now that the build backend is setuptools + a C
#   extension, ``uv build`` on the Linux runner would produce a
#   *Linux-only* wheel and publish that -- wrong for a cross-platform
#   release.  Before the next tagged release, fold publishing into this
#   workflow (add a publish job gated on tag push, using the same OIDC
#   trusted-publishing as publish.yml) and remove publish.yml's tag
#   trigger so the two don't double-publish.  Left as a deliberate
#   follow-up so the packaging can be validated green first.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/crcglot/_c.c"
      - "src/crcglot/_c.pyi"
      - "pyproject.toml"
      - ".github/workflows/wheels.yml"

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # One runner per (platform, arch).  abi3 means one wheel each,
        # good for every CPython 3.11+.
        os:
          # Linux runners build BOTH manylinux (glibc) and musllinux
          # (Alpine/musl) wheels for their arch -- so these two runners
          # yield four Linux wheels total.
          - ubuntu-latest      # manylinux + musllinux x86_64 (desktops, servers, WSL, Docker)
          - ubuntu-24.04-arm   # manylinux + musllinux aarch64 (Raspberry Pi 64-bit, Graviton)
          - windows-latest     # win_amd64 (Intel / AMD)
          - windows-11-arm     # win_arm64 (Surface Pro X, Snapdragon X laptops)
          - macos-14           # macOS arm64 (Apple Silicon)
          # macos-13 (Intel Mac) intentionally omitted: GitHub is
          # retiring the Intel-macOS runners and the job sat starved in
          # the queue.  Apple Silicon covers the modern Mac; the rare
          # Intel-Mac user builds from the always-published sdist (clang
          # is present).  Re-add `macos-13` here if Intel demand returns
          # and runners are available again.
    steps:
      - uses: actions/checkout@v4

      - name: Build + test wheels
        uses: pypa/cibuildwheel@v2.21.3
        # All build/test/skip config lives in [tool.cibuildwheel] in
        # pyproject.toml -- keeps this workflow thin and lets you
        # reproduce locally with ``pipx run cibuildwheel``.

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
